<!DOCTYPE html>
<html>
  <head>
    <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
    <base href="$FLUTTER_BASE_HREF">

    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="A new Flutter project.">

    <!-- iOS meta tags & icons -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="ithelpdesk">
    <link rel="apple-touch-icon" href="./icons/Icon-192.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <title>ithelpdesk</title>
    <link rel="manifest" href="./manifest.json">
    <style>
      #splash {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        width: 100vw;
        background: radial-gradient(circle at 50% 40%, #ffffff 0%, #f7f8f9 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        opacity: 1;
        transition: opacity 350ms ease;
      }

      #splash.hide {
        opacity: 0;
        pointer-events: none;
      }

      #splash .loader-shell {
        width: 124px;
        height: 124px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 12px 30px rgba(68, 111, 242, 0.16);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        backdrop-filter: blur(3px);
      }

      #splash .loader-stack {
        position: relative;
        width: 54px;
        height: 54px;
      }

      #splash .loader-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 3px solid transparent;
      }

      #splash .loader-ring.outer {
        border-top-color: #446ff2;
        border-right-color: #446ff2;
        animation: spin 1s linear infinite;
      }

      #splash .loader-ring.inner {
        inset: 8px;
        border-bottom-color: #872635;
        border-left-color: #872635;
        animation: spinReverse 1.35s linear infinite;
      }

      #splash .loader-dot {
        position: absolute;
        inset: 50%;
        width: 8px;
        height: 8px;
        margin-left: -4px;
        margin-top: -4px;
        border-radius: 50%;
        background: #2b2c34;
        animation: pulseDot 1.1s ease-in-out infinite;
      }

      #splash .loader-text {
        font-family: Arial, sans-serif;
        font-size: 12px;
        letter-spacing: 0.6px;
        color: #2b2c34;
        animation: pulseFade 1.4s ease-in-out infinite;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes spinReverse {
        from {
          transform: rotate(360deg);
        }
        to {
          transform: rotate(0deg);
        }
      }

      @keyframes pulseDot {
        0% {
          transform: scale(0.85);
          opacity: 0.6;
        }
        50% {
          transform: scale(1.2);
          opacity: 1;
        }
        100% {
          transform: scale(0.85);
          opacity: 0.6;
        }
      }

      @keyframes pulseFade {
        0% {
          opacity: 0.35;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0.35;
        }
      }
    </style>

    <script>
    // The value below is injected by flutter build, do not touch.
    const serviceWorkerVersion = '{{flutter_service_worker_version}}';
  </script>
    <!-- This script adds the flutter initialization JS code -->
    <script src="./flutter.js" defer></script>
  </head>
  <body>
    <div id="splash">
      <div class="loader-shell">
        <div class="loader-stack">
          <div class="loader-ring outer"></div>
          <div class="loader-ring inner"></div>
          <div class="loader-dot"></div>
        </div>
        <div class="loader-text">Loading...</div>
      </div>
    </div>

    <script src="flutter_bootstrap.js" async></script>
    <script
      src="//cdnjs.cloudflare.com/ajax/libs/pdf.js/2.11.338/pdf.min.js"></script>
    <script type="text/javascript">
   pdfjsLib.GlobalWorkerOptions.workerSrc = "//cdnjs.cloudflare.com/ajax/libs/pdf.js/2.11.338/pdf.worker.min.js";
</script>
    <script>
      (function () {
        const loader = document.getElementById('splash');
        if (!loader) return;

        function hideLoader() {
          loader.classList.add('hide');
          setTimeout(() => loader.remove(), 250);
        }

        // Hide when Flutter first view appears.
        const waitForFlutter = () => {
          const flutterReady =
            document.querySelector('flt-glass-pane') ||
            document.querySelector('flutter-view');
          if (flutterReady) {
            hideLoader();
          } else {
            requestAnimationFrame(waitForFlutter);
          }
        };

        requestAnimationFrame(waitForFlutter);
        // Fallback: never block UI if selector changes in future Flutter versions.
        setTimeout(hideLoader, 12000);
      })();
    </script>
  </body>
</html>
